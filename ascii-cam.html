<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ASCII CAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #c8ff00;
    --dim: #3a4a00;
    --ui: #1a1a1a;
    --border: #2a2a2a;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim);
  }

  header .logo {
    color: var(--fg);
    font-size: 14px;
    letter-spacing: 0.3em;
  }

  #status {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  #dot.live { background: var(--fg); box-shadow: 0 0 6px var(--fg); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding-top: 60px;
    padding-bottom: 70px;
    width: 100%;
  }

  /* Stacking layer */
  #stage {
    position: relative;
    display: inline-block;
    line-height: 0;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  #ascii-output {
    position: relative;
    z-index: 2;
    line-height: 1.15;
    letter-spacing: 0.07em;
    font-size: 16px;
    color: var(--fg);
    white-space: pre;
    text-shadow: 0 0 4px rgba(200,255,0,0.35);
    padding: 0;
    mix-blend-mode: normal;
    display: block;
    user-select: none;
  }

  #motion-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  #video-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    width: 100%;
    height: 100%;
    object-fit: fill; /* ASCIIと同じ縦横比に引き伸ばして完全一致 */
    opacity: 1;
    transform: scaleX(-1); /* 鏡像をASCIIに合わせる */
    pointer-events: none;
    transition: opacity 0.1s;
  }

  /* hidden processing elements */
  #video, #canvas { display: none; }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: var(--ui);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  button:hover { border-color: var(--fg); color: var(--fg); background: rgba(200,255,0,0.06); }
  button.active { border-color: var(--fg); color: var(--fg); background: rgba(200,255,0,0.1); }

  label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--fg);
    box-shadow: 0 0 4px var(--fg);
  }

  #start-btn {
    border-color: var(--fg);
    color: var(--fg);
    background: rgba(200,255,0,0.08);
    font-size: 13px;
    padding: 10px 32px;
  }
  #start-btn:hover { background: rgba(200,255,0,0.15); }

  /* overlay opacity label highlight */
  label.overlay-label { color: var(--fg); }

  #meta-display { display: inline-flex; align-items: center; gap: 6px; }
  #meta-display .sep { opacity: 0.5; }
</style>
</head>
<body>

<header>
  <span class="logo">ASCII CAM</span>
  <div id="status">
    <div id="dot"></div>
    <span id="status-text">STANDBY</span>
  </div>
  <span id="meta-display">
    <span id="res-display">--</span>
    <span class="sep">·</span>
    <span id="fps-display">-- FPS</span>
  </span>
</header>

<main>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="stage">
    <div id="ascii-output">[ PRESS START TO INITIALIZE CAMERA ]</div>
    <canvas id="motion-overlay"></canvas>
    <video id="video-overlay" autoplay playsinline muted></video>
  </div>
</main>

<footer>
  <button id="start-btn">▶ START</button>
  <button id="invert-btn">INVERT</button>
  <button id="blend-btn">NORMAL</button>
  <button id="motion-only-btn" class="active">MOTION ONLY</button>
  <label>RES <input type="range" id="res-slider" min="40" max="140" value="90" step="5"></label>
  <label>CONTRAST <input type="range" id="contrast-slider" min="0.5" max="3" value="1.75" step="0.1"></label>
  <label class="overlay-label">OVERLAY <input type="range" id="overlay-slider" min="0" max="1" value="1" step="0.01"></label>
  <span id="overlay-pct">100%</span>
</footer>

<script>
const CHARSET_DENSE  = '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. ';

let running = false;
let inverted = false;
let cols = 90;
let contrastVal = 1.75;
let overlayOpacity = 1;

// blend modes to cycle through
const BLEND_MODES = ['screen', 'lighten', 'hard-light', 'overlay', 'normal'];
let blendIndex = 4;

// Motion detection config
const GRID_COLS = 16;
const GRID_ROWS = 12;
const MOTION_THRESHOLD = 20;
const SOFT_TRACK_THRESHOLD = 10; // min diff to allow soft tracking
const ACTIVE_LINK_MS = 250;       // markers updated within this window can connect
const MARKER_LINGER_MS = 3000;
const MATCH_DIST = 0.15; // normalized coord distance for matching

const prevBlockLum = new Float32Array(GRID_COLS * GRID_ROWS);
const gridActive   = new Uint8Array(GRID_COLS * GRID_ROWS);
const gridDiff     = new Float32Array(GRID_COLS * GRID_ROWS);
let motionInitialized = false;
let trackedMarkers = []; // {x, y, diff, cells, lastSeen}

// Motion-only ASCII mode
const PIXEL_MOTION_THRESHOLD = 25;
const ASCII_LINGER_MS = 400;
let motionOnlyMode = true;
let prevPixelLum = null;
let pixelLastMove = null;
let pixelArraySize = 0;
let pixelMotionInitialized = false;

const video        = document.getElementById('video');
const videoOverlay = document.getElementById('video-overlay');
const canvas       = document.getElementById('canvas');
const output       = document.getElementById('ascii-output');
const dot          = document.getElementById('dot');
const statusTx     = document.getElementById('status-text');
const fpsDsp       = document.getElementById('fps-display');
const overlayPct   = document.getElementById('overlay-pct');
const ctx          = canvas.getContext('2d', { willReadFrequently: true });
const motionCanvas = document.getElementById('motion-overlay');
const motionCtx    = motionCanvas.getContext('2d');

document.getElementById('start-btn').addEventListener('click', toggleCamera);

document.getElementById('invert-btn').addEventListener('click', () => {
  inverted = !inverted;
  document.getElementById('invert-btn').classList.toggle('active', inverted);
});

document.getElementById('motion-only-btn').addEventListener('click', () => {
  motionOnlyMode = !motionOnlyMode;
  document.getElementById('motion-only-btn').classList.toggle('active', motionOnlyMode);
});

document.getElementById('blend-btn').addEventListener('click', () => {
  blendIndex = (blendIndex + 1) % BLEND_MODES.length;
  const mode = BLEND_MODES[blendIndex];
  output.style.mixBlendMode = mode;
  document.getElementById('blend-btn').textContent = mode.toUpperCase();
  document.getElementById('blend-btn').classList.toggle('active', mode !== 'normal');
});

document.getElementById('res-slider').addEventListener('input', e => {
  cols = parseInt(e.target.value);
});

document.getElementById('contrast-slider').addEventListener('input', e => {
  contrastVal = parseFloat(e.target.value);
});

document.getElementById('overlay-slider').addEventListener('input', e => {
  overlayOpacity = parseFloat(e.target.value);
  videoOverlay.style.opacity = overlayOpacity;
  overlayPct.textContent = Math.round(overlayOpacity * 100) + '%';
});

async function toggleCamera() {
  if (running) {
    running = false;
    [video, videoOverlay].forEach(v => {
      v.srcObject?.getTracks().forEach(t => t.stop());
      v.srcObject = null;
    });
    dot.className = '';
    statusTx.textContent = 'STANDBY';
    document.getElementById('start-btn').textContent = '▶ START';
    document.getElementById('res-display').textContent = '--';
    output.textContent = '[ CAMERA STOPPED ]';
    output.style.color = 'var(--dim)';
    motionInitialized = false;
    gridActive.fill(0);
    gridDiff.fill(0);
    prevBlockLum.fill(0);
    trackedMarkers = [];
    pixelMotionInitialized = false;
    if (prevPixelLum) prevPixelLum.fill(0);
    if (pixelLastMove) pixelLastMove.fill(0);
    motionCtx.clearRect(0, 0, motionCanvas.width, motionCanvas.height);
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      },
      audio: false
    });
    // 処理用とオーバーレイ用に同じストリームをセット
    video.srcObject = stream;
    videoOverlay.srcObject = stream;
    await Promise.all([video.play(), videoOverlay.play()]);
    // 実解像度の表示
    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    console.log('Camera negotiated:', settings);
    document.getElementById('res-display').textContent = `${settings.width}×${settings.height}`;
    running = true;
    dot.className = 'live';
    statusTx.textContent = 'LIVE';
    output.style.color = 'var(--fg)';
    document.getElementById('start-btn').textContent = '■ STOP';
    requestAnimationFrame(renderLoop);
  } catch(err) {
    output.textContent = `[ CAMERA ERROR: ${err.message} ]`;
    statusTx.textContent = 'ERROR';
  }
}

let lastTime = 0;
let frameCount = 0;

function renderLoop(ts) {
  if (!running) return;

  frameCount++;
  if (ts - lastTime > 1000) {
    fpsDsp.textContent = `${Math.round(frameCount * 1000 / (ts - lastTime))} FPS`;
    frameCount = 0;
    lastTime = ts;
  }

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(renderLoop); return; }

  const COLS = cols;
  const aspect = 0.55;
  const ROWS = Math.floor(COLS * (vh / vw) * aspect);

  canvas.width  = COLS;
  canvas.height = ROWS;

  // Resize per-pixel motion buffers if needed
  const pixCount = COLS * ROWS;
  if (pixCount !== pixelArraySize) {
    prevPixelLum  = new Float32Array(pixCount);
    pixelLastMove = new Float64Array(pixCount);
    pixelArraySize = pixCount;
    pixelMotionInitialized = false;
  }

  ctx.save();
  ctx.translate(COLS, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, COLS, ROWS);
  ctx.restore();

  const imgData = ctx.getImageData(0, 0, COLS, ROWS).data;
  const charset = CHARSET_DENSE;
  const clen = charset.length - 1;

  let lines = [];
  for (let row = 0; row < ROWS; row++) {
    let line = '';
    for (let col = 0; col < COLS; col++) {
      const i = (row * COLS + col) * 4;
      const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
      const lum = 0.299*r + 0.587*g + 0.114*b;

      // Per-pixel motion tracking (raw luminance, before contrast)
      const pi = row * COLS + col;
      if (pixelMotionInitialized) {
        if (Math.abs(lum - prevPixelLum[pi]) > PIXEL_MOTION_THRESHOLD) {
          pixelLastMove[pi] = ts;
        }
      }
      prevPixelLum[pi] = lum;

      // Apply contrast for ASCII mapping
      let lumC = ((lum / 255 - 0.5) * contrastVal + 0.5) * 255;
      lumC = Math.max(0, Math.min(255, lumC));
      let idx = Math.floor((lumC / 255) * clen);
      if (!inverted) idx = clen - idx;

      if (motionOnlyMode && (ts - pixelLastMove[pi] > ASCII_LINGER_MS)) {
        line += ' ';
      } else {
        line += charset[idx];
      }
    }
    lines.push(line);
  }
  pixelMotionInitialized = true;

  output.textContent = lines.join('\n');

  // Motion detection & markers
  const stageEl = document.getElementById('stage');
  motionCanvas.width  = stageEl.clientWidth;
  motionCanvas.height = stageEl.clientHeight;
  detectMotion(imgData, COLS, ROWS);
  updateTrackedMarkers(ts);
  drawMotionMarkers(ts);

  requestAnimationFrame(renderLoop);
}

function detectMotion(imgData, frameCols, frameRows) {
  const bw = frameCols / GRID_COLS;
  const bh = frameRows / GRID_ROWS;
  gridActive.fill(0);

  for (let gy = 0; gy < GRID_ROWS; gy++) {
    for (let gx = 0; gx < GRID_COLS; gx++) {
      let sum = 0, count = 0;
      const x0 = Math.floor(gx * bw);
      const y0 = Math.floor(gy * bh);
      const x1 = Math.floor((gx + 1) * bw);
      const y1 = Math.floor((gy + 1) * bh);

      for (let y = y0; y < y1; y++) {
        for (let x = x0; x < x1; x++) {
          const i = (y * frameCols + x) * 4;
          sum += 0.299 * imgData[i] + 0.587 * imgData[i+1] + 0.114 * imgData[i+2];
          count++;
        }
      }

      const avg = count > 0 ? sum / count : 0;
      const idx = gy * GRID_COLS + gx;

      if (motionInitialized) {
        const diff = Math.abs(avg - prevBlockLum[idx]);
        gridDiff[idx] = diff;
        if (diff > MOTION_THRESHOLD) {
          gridActive[idx] = 1;
        }
      }

      prevBlockLum[idx] = avg;
    }
  }
  motionInitialized = true;
}

function findClusters() {
  const visited = new Uint8Array(GRID_COLS * GRID_ROWS);
  const clusters = [];

  for (let gy = 0; gy < GRID_ROWS; gy++) {
    for (let gx = 0; gx < GRID_COLS; gx++) {
      const idx = gy * GRID_COLS + gx;
      if (!gridActive[idx] || visited[idx]) continue;

      const queue = [{gx, gy}];
      visited[idx] = 1;
      let sumX = 0, sumY = 0, sumDiff = 0, count = 0;

      while (queue.length > 0) {
        const {gx: cx, gy: cy} = queue.shift();
        sumX += cx; sumY += cy;
        sumDiff += gridDiff[cy * GRID_COLS + cx];
        count++;

        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || nx >= GRID_COLS || ny < 0 || ny >= GRID_ROWS) continue;
          const ni = ny * GRID_COLS + nx;
          if (!gridActive[ni] || visited[ni]) continue;
          visited[ni] = 1;
          queue.push({gx: nx, gy: ny});
        }
      }

      clusters.push({
        x: (sumX / count + 0.5) / GRID_COLS,
        y: (sumY / count + 0.5) / GRID_ROWS,
        diff: sumDiff / count,
        cells: count
      });
    }
  }
  return clusters;
}

function updateTrackedMarkers(ts) {
  const clusters = findClusters();
  const used = new Uint8Array(clusters.length);

  // Match existing markers to nearest cluster
  for (const m of trackedMarkers) {
    let bestIdx = -1, bestDist = MATCH_DIST;
    for (let i = 0; i < clusters.length; i++) {
      if (used[i]) continue;
      const dx = m.x - clusters[i].x;
      const dy = m.y - clusters[i].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    if (bestIdx >= 0) {
      const c = clusters[bestIdx];
      m.x = c.x; m.y = c.y;
      m.diff = c.diff; m.cells = c.cells;
      m.lastSeen = ts;
      m.lastActive = ts;
      used[bestIdx] = 1;
    } else {
      // Soft tracking: follow highest diff cell in neighborhood
      const gx = Math.floor(m.x * GRID_COLS);
      const gy = Math.floor(m.y * GRID_ROWS);
      const r = 2; // search radius in grid cells
      let bestDiff = 0, bx = gx, by = gy;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const nx = gx + dx, ny = gy + dy;
          if (nx < 0 || nx >= GRID_COLS || ny < 0 || ny >= GRID_ROWS) continue;
          const d = gridDiff[ny * GRID_COLS + nx];
          if (d > bestDiff) { bestDiff = d; bx = nx; by = ny; }
        }
      }
      if (bestDiff >= SOFT_TRACK_THRESHOLD) {
        m.x = (bx + 0.5) / GRID_COLS;
        m.y = (by + 0.5) / GRID_ROWS;
        m.diff = bestDiff;
      }
    }
  }

  // Create new markers for unmatched clusters
  for (let i = 0; i < clusters.length; i++) {
    if (used[i]) continue;
    const c = clusters[i];
    trackedMarkers.push({ x: c.x, y: c.y, diff: c.diff, cells: c.cells, lastSeen: ts, lastActive: ts });
  }

  // Remove expired markers
  trackedMarkers = trackedMarkers.filter(m => ts - m.lastSeen <= MARKER_LINGER_MS);
}

function drawMotionMarkers(ts) {
  const w = motionCanvas.width;
  const h = motionCanvas.height;
  motionCtx.clearRect(0, 0, w, h);

  if (trackedMarkers.length === 0) return;

  const pts = trackedMarkers.map(m => ({
    px: m.x * w, py: m.y * h,
    diff: m.diff, cells: m.cells,
    active: ts - m.lastActive <= ACTIVE_LINK_MS
  }));

  // Connecting lines: only between currently-active markers
  motionCtx.strokeStyle = '#fff';
  motionCtx.lineWidth = 1;
  for (let i = 0; i < pts.length; i++) {
    if (!pts[i].active) continue;
    for (let j = i + 1; j < pts.length; j++) {
      if (!pts[j].active) continue;
      motionCtx.beginPath();
      motionCtx.moveTo(pts[i].px, pts[i].py);
      motionCtx.lineTo(pts[j].px, pts[j].py);
      motionCtx.stroke();
    }
  }

  // Square markers
  const markerSize = Math.max(3, w / GRID_COLS * 0.075);
  const half = markerSize / 2;
  motionCtx.lineWidth = 1.5;
  for (const p of pts) {
    motionCtx.strokeRect(p.px - half, p.py - half, markerSize, markerSize);
  }

  // Data labels
  const fontSize = 16;
  motionCtx.font = `${fontSize}px 'Share Tech Mono', monospace`;
  motionCtx.fillStyle = '#fff';
  motionCtx.textBaseline = 'top';
  for (const p of pts) {
    const val = (p.diff * p.cells + p.px * 0.1 + p.py * 0.07) % 1000;
    motionCtx.fillText(val.toFixed(1), p.px + half + 3, p.py - half);
  }
}
</script>
</body>
</html>
